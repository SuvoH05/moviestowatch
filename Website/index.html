<form id="movieForm">

Genre:
<select id="genre">
<option>Action</option>
<option>Thriller</option>
<option>Comedy</option>
<option>Sci-Fi</option>
<option>Horror</option>
<option>Documentary</option>
</select>

Type:
<select id="type">
<option>Movie</option>
<option>Series</option>
</select>

Vibe:
<select id="vibe">
<option>Dark</option>
<option>Funny</option>
<option>Epic</option>
<option>Mind-bending</option>
</select>

Character:
<select id="character">
<option>Detective</option>
<option>Hacker</option>
<option>Villain</option>
<option>AI</option>
</select>

Actor / Actress:
<input type="text" id="actor">

Minimum Rating:
<select id="rating">
<option>6</option>
<option>7</option>
<option>8</option>
</select>

<button type="submit">Find Movies</button>

</form>
